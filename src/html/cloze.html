<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Anki Cloze 编辑器</title>
    <script>
        MathJax = {
          tex: {
            inlineMath: [['\\(', '\\)']],
            displayMath: [['$$', '$$']]
          }
        };
        </script>
    <style>
        /* 原有样式保持不变 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .deck-info {
            padding: 10px;
            background: #f5f5f5;
            border-bottom: 1px solid #ccc;
        }

        .toolbar {
            padding: 10px;
            background: #f9f9f9;
            border-bottom: 1px solid #ccc;
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .session-container {
            width: 20%;
            background: #f0f0f0;
            border-right: 1px solid #ccc;
            overflow-y: auto;
            padding: 10px;
        }

        /* 新增和修改的样式 */
        .session-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 8px;
        }

        .session-header h2 {
            margin: 0;
            flex: 1;
        }

        .session-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        #session-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #session-list li {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 5px 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            gap: 8px;
        }

        #session-list li:hover {
            background: #e0e0ff;
        }

        #session-list li.selected {
            background: #d0d0ff;
            border-color: #aaa;
        }

        .session-checkbox {
            margin: 0;
        }

        .session-content {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .edit-title-btn {
            background: none;
            border: none;
            color: #007bff;
            cursor: pointer;
            padding: 0;
            font-size: 12px;
        }

        .edit-title-btn:hover {
            text-decoration: underline;
        }

        /* 其余原有样式保持不变 */
        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #editor {
            flex: 1;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            background: #fff;
            margin: 10px;
            border-radius: 4px;
            font-family: monospace;
            resize: none;
        }

        #preview {
            flex: 1;
            border: 1px solid #ccc;
            padding: 10px;
            overflow-y: auto;
            background-color: #f9f9f9;
            margin: 10px;
            border-radius: 4px;
        }

        button {
            margin-right: 5px;
            padding: 5px 10px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        button.danger {
            background: #dc3545;
        }

        button.danger:hover {
            background: #c82333;
        }
        .cloze-highlight {
            background-color: yellow; /* Or any color you prefer */
            color: black;          /* Adjust text color for contrast */
            font-weight: bold;     /* Make it stand out more */
            padding: 2px;         /* Add a little padding */
            border-radius: 3px;    /* Rounded corners (optional) */
        }
    </style>
</head>
<body>
    <div class="deck-info">
        <input type="number" id="deckId" placeholder="Deck ID">
        <input type="text" id="deckName" placeholder="Deck Name">
        <button id="saveDeckInfoBtn">保存</button>
        <button id="openYamlFileBtn">打开 YAML 文件</button>
        <button id="generateApkgBtn">生成 Anki 文件</button>
    </div>

    <div class="toolbar">
        <button id="wrapClozeBtn">Cloze</button>
        <button id="nextClozeBtn">Next Cloze</button>
        <button id="formatBoldBtn">加粗</button>
        <button id="formatItalicBtn">斜体</button>
        <button id="toHtmlBtn">转换成HTML</button>
    </div>

    <div class="container">
        <div class="session-container">
            <div class="session-header">
                <h2>Sessions</h2>
            </div>
            <div class="session-actions">
                <button id="selectAllBtn">全选</button>
                <button id="deleteSelectedBtn" class="danger">删除所选</button>
            </div>
            <ul id="session-list"></ul>
            <button id="addNewSessionBtn">新建 Session</button>
        </div>

        <div class="editor-container">
            <textarea id="editor"></textarea>
            <div id="preview"></div>
        </div>
    </div>

    <!-- 引入依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.3.6/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- 引入 JavaScript 文件 -->
    <script src="cloze.js"></script>
</body>
</html>
